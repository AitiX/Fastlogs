<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>FastLogs - Catalog</title>
  <link rel="stylesheet" href="/fonts.css">
  <link rel="stylesheet" href="/browse.css">
</head>
<body>
<div class="page">

  <div class="topbar">
    <a class="topbar-logo" href="/browse">Fast<span>Logs</span></a>
    <span class="topbar-sep">/</span>
    <div class="topbar-crumbs" id="breadcrumbs">
      <!-- Filled by browse.js -->
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <input class="filter-input" id="filter-input" type="search" placeholder="Filter...">
    <select class="filter-select" id="platform-select" style="display:none">
      <option value="">All platforms</option>
    </select>
    <select class="filter-select" id="level-select" style="display:none">
      <option value="">Any level</option>
      <option value="error">Has errors</option>
      <option value="warn">Has warnings</option>
    </select>
    <select class="filter-select" id="status-select" style="display:none">
      <option value="">Any status</option>
      <option value="new">New</option>
      <option value="triaged">Triaged</option>
      <option value="in_progress">In progress</option>
      <option value="fixed">Fixed</option>
      <option value="wontfix">Won't fix</option>
    </select>
    <select class="filter-select" id="sort-select" style="display:none">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="errors">Most errors</option>
      <option value="largest">Largest</option>
    </select>
    <select class="filter-select" id="folder-select" style="display:none">
      <option value="">All folders</option>
    </select>
    <label class="filter-toggle-label" id="errors-only-label" style="display:none">
      <input type="checkbox" id="errors-only-cb"> Errors only
    </label>
  </div>

  <!-- Folder move toolbar (logs view only); revealed by browse.js when logs
       are selected via the row checkboxes. -->
  <div class="folder-bar" id="folder-bar" style="display:none">
    <span class="folder-bar-count" id="folder-bar-count">0 selected</span>
    <input class="filter-input folder-bar-input" id="folder-move-input" type="text"
           list="folder-datalist" placeholder="Folder (e.g. Release/QA), blank = root">
    <datalist id="folder-datalist"></datalist>
    <button class="folder-bar-btn" id="folder-move-btn" type="button">Move to folder</button>
    <span class="folder-bar-msg" id="folder-bar-msg"></span>
  </div>

  <div id="content">
    <div class="empty-state"><span class="spinner"></span>Loading...</div>
  </div>

</div>
<script src="/browse.js"></script>
</body>
</html>
