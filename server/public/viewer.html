<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>FastLogs</title>
  <link rel="stylesheet" href="/viewer.css">
</head>
<body>
<div class="page">

  <div class="topbar">
    <a class="topbar-logo" id="topbar-logo" href="/browse">Fast<span>Logs</span></a>
    <span class="topbar-sep">/</span>
    <span class="topbar-title" id="page-title">Loading...</span>
    <div class="topbar-actions">
      <select class="status-select" id="status-select" title="Triage status">
        <option value="new">New</option>
        <option value="triaged">Triaged</option>
        <option value="in_progress">In progress</option>
        <option value="fixed">Fixed</option>
        <option value="wontfix">Won't fix</option>
      </select>
      <a class="btn btn-ghost" id="raw-link" href="#">Raw</a>
      <button class="btn btn-ghost" id="copy-link-btn" type="button">Copy link</button>
      <button class="btn btn-pin" id="pin-btn" type="button">Pin</button>
      <a class="btn btn-redmine" id="redmine-btn" style="display:none"></a>
    </div>
  </div>

  <div class="comment-box" id="comment-box" style="display:none">
    <div class="comment-label">Comment</div>
    <div class="comment-text" id="comment-text"></div>
  </div>

  <div class="tags-box" id="tags-box">
    <div class="tags-label">Tags</div>
    <div class="tags-list" id="tags-list"></div>
    <input class="tags-input" id="tags-input" type="text" placeholder="Add tag, press Enter">
  </div>

  <div class="counts-bar" id="counts-bar">
    <span class="count-item count-error">
      <span class="count-dot count-dot-e"></span>
      <span id="cnt-error">0</span>&nbsp;errors
    </span>
    <span class="count-item count-warn">
      <span class="count-dot count-dot-w"></span>
      <span id="cnt-warn">0</span>&nbsp;warnings
    </span>
    <span class="count-item count-log">
      <span class="count-dot count-dot-l"></span>
      <span id="cnt-log">0</span>&nbsp;logs
    </span>
    <span class="counts-meta" id="counts-meta"></span>
  </div>

  <div class="device-panel" id="device-panel">
    <div class="device-panel-header" id="device-panel-header">
      <h3>Device Info</h3>
      <span class="device-arrow">&#9658;</span>
    </div>
    <div class="device-groups" id="device-groups"></div>
  </div>

  <div class="ctx-panel" id="scene-panel" style="display:none">
    <div class="ctx-panel-header" id="scene-panel-header">
      <span class="ctx-arrow">&#9658;</span>
      <h3>Scene Context</h3>
      <span class="ctx-count" id="scene-count"></span>
    </div>
    <div class="ctx-body" id="scene-body"></div>
  </div>

  <div class="ctx-panel" id="context-panel" style="display:none">
    <div class="ctx-panel-header" id="context-panel-header">
      <span class="ctx-arrow">&#9658;</span>
      <h3>Context</h3>
    </div>
    <div class="ctx-body" id="context-body"></div>
  </div>

  <div class="ctx-panel" id="breadcrumbs-panel" style="display:none">
    <div class="ctx-panel-header" id="breadcrumbs-panel-header">
      <span class="ctx-arrow">&#9658;</span>
      <h3>Breadcrumbs</h3>
      <span class="ctx-count" id="breadcrumbs-count"></span>
    </div>
    <div class="ctx-body" id="breadcrumbs-body"></div>
  </div>

  <div class="screenshot-wrap" id="screenshot-wrap" style="display:none">
    <div class="screenshot-header" id="screenshot-header">
      <span id="screenshot-arrow">&#9658;</span>&nbsp;<span id="screenshot-label">Screenshot</span>
    </div>
    <div class="screenshot-body" id="screenshot-body"></div>
  </div>

  <div class="ctx-panel" id="attachments-panel" style="display:none">
    <div class="ctx-panel-header" id="attachments-panel-header">
      <span class="ctx-arrow">&#9658;</span>
      <h3>Attachments</h3>
      <span class="ctx-count" id="attachments-count"></span>
    </div>
    <div class="ctx-body" id="attachments-body"></div>
  </div>

  <div class="log-controls">
    <input class="search-input" id="search-input" type="search" placeholder="Search logs...">
    <div class="level-filters">
      <button class="level-btn level-btn-all active" data-level="all" type="button">All</button>
      <button class="level-btn level-btn-e" data-level="error" type="button">E</button>
      <button class="level-btn level-btn-w" data-level="warn" type="button">W</button>
      <button class="level-btn level-btn-l" data-level="log" type="button">L</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="pretty" type="button">Pretty</button>
      <button class="view-btn" data-view="raw" type="button">Raw</button>
    </div>
  </div>

  <div class="log-wrap">
    <div class="log-stats">
      <span id="log-line-count">0 lines</span>
      <span id="log-visible-count"></span>
      <button class="log-copy-btn" id="log-copy-btn" type="button">Copy log</button>
    </div>
    <div class="log-body log-pretty active" id="log-pretty"></div>
    <pre class="log-raw" id="log-raw"></pre>
  </div>

</div>

<div class="toast" id="toast"></div>

<!--
  The server replaces the sentinel below with a JSON object literal.
  Shape: { id, appId, appVersion, platform, title, timestampUtc, pinned,
           counts: { error, warn, log },
           hasScreenshot,
           status,                       // new | triaged | in_progress | fixed | wontfix
           tags: [string, ...],          // possibly empty
           engine,                       // "Unity" | "GameMaker" | null
           redmineEnabled,               // boolean
           redmineIssue: { id, url } | null,
           logText: string (decompressed),
           device: { system:{}, graphics:{}, display:{}, application:{},
                     runtime:{}, memory:{}, network:{}, build:{}, web:{} },
           context: { key: value, ... },
           breadcrumbs: [ { t?, m, lvl? }, ... ],
           sceneContext: string | null,  // opaque JSON, parsed + rendered client-side
           correlationCode: string | null,
           sessionId: string | null,     // per-launch id; "session logs" link in the meta line
           attachments: [ { id, name, size, kind, mime, downloadUrl }, ... ] }  // standalone files attached to this log
  See viewer.js for the full contract.
-->
<script>var __LD = /*__FASTLOGS_DATA__*/ null;</script>
<script src="/viewer.js"></script>
</body>
</html>
